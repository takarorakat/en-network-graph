</div>
<script>
(function(){
  var PASS = "0362666661";
  var key = "en_network_auth";
  if (sessionStorage.getItem(key) === "1") {
    document.addEventListener("DOMContentLoaded", function(){
      var o = document.getElementById("pw-overlay");
      if (o) o.remove();
    });
  }
  window.checkPw = function() {
    var v = document.getElementById("pw-input").value;
    if (v === PASS) {
      sessionStorage.setItem(key, "1");
      document.getElementById("pw-overlay").remove();
    } else {
      document.getElementById("pw-error").textContent = "パスワードが違います";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  };
  document.addEventListener("keydown", function(e){
    if (e.key === "Enter") { var b = document.getElementById("pw-btn"); if(b) b.click(); }
  });
})();
</script>

// カラーユーティリティ
function _hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function _rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(function(v){return Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');}).join('');
}
function _blend(hex, tr, tg, tb, ratio) {
  var c = _hexToRgb(hex);
  return _rgbToHex(c[0]+(tr-c[0])*ratio, c[1]+(tg-c[1])*ratio, c[2]+(tb-c[2])*ratio);
}
function _darken(hex, r) { return _blend(hex,0,0,0,r||0.35); }
function _lighten(hex, r) { return _blend(hex,255,255,255,r||0.78); }
function _spec(bg, border) {
  return { background:bg, border:border, hover:{background:bg,border:border}, highlight:{background:bg,border:border} };
}
function _origSpec(hex)  { return _spec(hex, _darken(hex,0.15)); }
function _darkSpec(hex)  { return _spec(_darken(hex,0.35), _darken(hex,0.55)); }
function _fadeSpec(hex)  { var f=_lighten(hex,0.78); return _spec(f,f); }

document.addEventListener("DOMContentLoaded", function() {
  var checkReady = setInterval(function() {
    if (typeof network !== "undefined" && typeof nodes !== "undefined" && typeof edges !== "undefined") {
      clearInterval(checkReady);

      // 初期ロード時に完全スペックを適用（vis.js自動hover色を上書き防止）
      nodes.update(nodes.get().map(function(n) {
        var hex = _origNodeColors[n.id] || "#78909C";
        return { id: n.id, color: _origSpec(hex) };
      }));

      var highlightActive = false;

      network.on("hoverNode", function(params) {
        highlightActive = true;
        var hovered   = params.node;
        var neighbors = new Set(network.getConnectedNodes(hovered));
        var connEdges = new Set(network.getConnectedEdges(hovered));

        nodes.update(nodes.get().map(function(n) {
          var hex = _origNodeColors[n.id] || "#78909C";
          if (n.id === hovered) {
            return { id: n.id, color: _darkSpec(hex), font: { color: "#ffffff" } };
          } else if (neighbors.has(n.id)) {
            return { id: n.id, color: _origSpec(hex), font: { color: _origNodeFonts[n.id] || "#222222" } };
          } else {
            return { id: n.id, color: _fadeSpec(hex), font: { color: _lighten(_origNodeFonts[n.id]||"#222222", 0.78) } };
          }
        }));

        edges.update(edges.get().map(function(e) {
          return { id: e.id,
            color: connEdges.has(e.id) ? { color: "#888888", opacity: 1.0 } : { color: "#e8e8e8", opacity: 0.15 },
            width: connEdges.has(e.id) ? 2 : 0.5 };
        }));
      });

      network.on("blurNode", function() {
        if (!highlightActive) return;
        highlightActive = false;
        nodes.update(nodes.get().map(function(n) {
          var hex = _origNodeColors[n.id] || "#78909C";
          return { id: n.id, color: _origSpec(hex), font: { color: _origNodeFonts[n.id] || "#222222" } };
        }));
        edges.update(edges.get().map(function(e) {
          return { id: e.id, color: { color: "#cccccc", opacity: 1.0 }, width: 1 };
        }));
      });
    }
  }, 200);
});

function escapeHtml(value) {
  if (!value) return "";
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function roleOrder(role) {
  if (!role) return "9";
  if (role === "会長" || role.startsWith("会長")) return "0";
  if (role.includes("副会長")) return "1";
  if (role.includes("委員長")) return "2";
  if (role.includes("委員")) return "3";
  if (role.includes("地区長")) return "4";
  if (role.includes("監事")) return "8";
  return "5" + role;
}

function showGraph() {
  document.getElementById("list-view").style.display = "none";
  document.getElementById("mynetwork").style.display = "";
  document.getElementById("btn-graph").classList.add("active");
  document.getElementById("btn-list").classList.remove("active");
  document.getElementById("legend").style.display = "";
}

function showList() {
  document.getElementById("list-view").style.display = "block";
  document.getElementById("mynetwork").style.display = "none";
  document.getElementById("btn-graph").classList.remove("active");
  document.getElementById("btn-list").classList.add("active");
  document.getElementById("legend").style.display = "none";
  renderTagFilters();
  renderTable();
}

function renderTagChips(tags) {
  if (!tags || !tags.length) return "—";
  return tags.map(function(tag) {
    var color = tagColorMap[tag] || "#78909C";
    return "<span class='list-tag-chip' style='background:" + color + "'>" + escapeHtml(tag) + "</span>";
  }).join("");
}

function detailSection(title, body) {
  var content = body ? escapeHtml(body) : "<span class='detail-empty'>—</span>";
  return "<div class='detail-section'><h3>" + title + "</h3><div>" + content + "</div></div>";
}

function showPersonDetail(p) {
  var detail = document.getElementById("person-detail");
  detail.classList.add("open");
  detail.innerHTML =
    "<h2>" + escapeHtml(p.name) + "</h2>" +
    "<div class='garden'>" + escapeHtml(p.garden || "") + "</div>" +
    detailSection("所属園", p.sec_garden) +
    detailSection("所在地", [p.prefecture, p.city].filter(Boolean).join("\n")) +
    detailSection("法人・園役職", p.sec_corp_role) +
    detailSection("園・法人リンク", p.sec_garden_links) +
    detailSection("園・法人電話番号", p.sec_garden_phone) +
    detailSection("所属団体", (p.tags || []).join("\n")) +
    detailSection("団体役職", p.sec_org_role) +
    detailSection("団体関連", p.sec_trustee) +
    detailSection("団体リンク", p.sec_org_links) +
    detailSection("備考", p.sec_memo);
}

function renderTagFilters() {
  var container = document.getElementById("tag-filters");
  var tagQuery = (document.getElementById("tag-search-box")?.value || "").toLowerCase().replace(/^#+/, "");
  container.innerHTML = "";

  // 「すべて」ボタン
  var allBtn = document.createElement("button");
  allBtn.className = "tag-filter-btn" + (currentTag === null ? " active" : "");
  allBtn.textContent = "すべて";
  allBtn.style.background = currentTag === null ? "#607D8B" : "";
  allBtn.style.color = currentTag === null ? "#fff" : "";
  allBtn.onclick = function() { currentTag = null; renderTagFilters(); renderTable(); };
  container.appendChild(allBtn);

  Object.keys(tagColorMap).sort().filter(function(tag) {
    return !tagQuery || tag.toLowerCase().includes(tagQuery);
  }).forEach(function(tag) {
    var btn = document.createElement("button");
    var isActive = currentTag === tag;
    btn.className = "tag-filter-btn" + (isActive ? " active" : "");
    btn.textContent = "#" + tag;
    if (isActive) btn.style.background = tagColorMap[tag];
    btn.onclick = function() {
      currentTag = isActive ? null : tag;
      renderTagFilters();
      renderTable();
    };
    container.appendChild(btn);
  });
}

function renderTable() {
  var query = (document.getElementById("search-box").value || "").toLowerCase().replace(/^#+/, "");
  var all = Object.values(personDetails);

  var filtered = all.filter(function(p) {
    if (currentTag && !p.tags.includes(currentTag)) return false;
    if (query) {
      var haystack = [
        p.name, p.garden, p.org_role, p.corp_role, p.city
      ].join(" ").toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  filtered.sort(function(a, b) {
    var ro = roleOrder(a.org_role).localeCompare(roleOrder(b.org_role));
    if (ro !== 0) return ro;
    return (a.name || "").localeCompare(b.name || "");
  });

  var tbody = document.getElementById("list-tbody");
  tbody.innerHTML = "";
  filtered.forEach(function(p) {
    var tr = document.createElement("tr");
    tr.innerHTML =
      "<td class='col-org-role'>"  + escapeHtml(p.org_role  || "—") + "</td>" +
      "<td class='col-tags'>" + renderTagChips(p.tags || []) + "</td>" +
      "<td class='col-name'>"   + escapeHtml(p.name)   + "</td>" +
      "<td class='col-corp-role'>" + escapeHtml(p.corp_role || "—") + "</td>" +
      "<td class='col-garden'>" + escapeHtml(p.garden) + "</td>" +
      "<td class='col-city'>"   + escapeHtml(p.city || "—") + "</td>";
    tr.onclick = function() {
      showPersonDetail(p);
    };
    tbody.appendChild(tr);
  });

  document.getElementById("list-count").textContent = filtered.length + "件";
}
