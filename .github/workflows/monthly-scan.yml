name: Monthly Network Scan

on:
  schedule:
    - cron: '3 0 1 * *'  # 毎月1日 9:03 JST (UTC 0:03)
  workflow_dispatch:      # 手動実行も可能

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 最大5時間
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 ddgs lxml

      - name: Scan national (12団体)
        run: python3 scripts/scan_network.py --level national

      - name: Scan prefecture (55団体)
        run: python3 scripts/scan_network.py --level prefecture

      - name: Scan city (264団体)
        run: python3 scripts/scan_network.py --level city

      - name: Generate URL candidates
        run: python3 scripts/update_direct_urls.py $(date +%Y%m%d)

      - name: Commit scan results and URL candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results/ url_candidates/
          git diff --staged --quiet || git commit -m "scan: monthly network scan $(date +%Y-%m-%d)"
          git push

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TODAY=$(date +%Y%m%d)
          NATIONAL=$(wc -l < "scan_results/scan_result_${TODAY}_national.txt" 2>/dev/null | tr -d ' ')
          PREF=$(wc -l < "scan_results/scan_result_${TODAY}_prefecture.txt" 2>/dev/null | tr -d ' ')
          CITY=$(wc -l < "scan_results/scan_result_${TODAY}_city.txt" 2>/dev/null | tr -d ' ')
          URL_COUNT=$(python3 -c "import json,pathlib; f=pathlib.Path('url_candidates/url_candidates_${TODAY}.json'); print(len(json.loads(f.read_text())) if f.exists() else 0)")
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🔍 *園関係ネットワーク 月次スキャン完了*\n実行日: $(date +%Y-%m-%d)\n・全国: ${NATIONAL}行 / 都道府県: ${PREF}行 / 市区町村: ${CITY}行\n・URL追加候補: *${URL_COUNT}件*\n\nMacでClaude Codeに依頼:\n① \`scan_result_${TODAY}_national.txt と _prefecture.txt と _city.txt を読んで反映して\`\n② \`url_candidates_${TODAY}.json を確認して追加して\`\"}" \
            "$SLACK_WEBHOOK_URL"
